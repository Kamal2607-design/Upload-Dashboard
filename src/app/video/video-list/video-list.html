<div class="header-container">
  <div class="title-section">
    <h2>Content Upload</h2>
  </div>

  <div class="action-section">
    <button class="export-btn" (click)="exportData()">Export</button>
    <button class="upload-btn" (click)="openUpload()">+ Upload Video</button>
  </div>
</div>

<div class="filter-container">

  <div class="left-filters">
    <select (change)="onVisibilityFilter($event)">
      <option value="visible">Visible</option>
      <option value="hidden">Hidden</option>
    </select>

    <mat-form-field appearance="outline">
      <mat-label>Date</mat-label>
      <input matInput [matDatepicker]="picker"
             [(ngModel)]="selectedDate"
             (dateChange)="onDateFilter()" />
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

    <select (change)="onQuickDateFilter($event)">
      <option value="week">Last Week</option>
      <option value="month">Last Month</option>
    </select>
  </div>

  <div class="right-search">
    <input
      type="text"
      placeholder="Search..."
      (input)="onSearch($event)" />
  </div>

</div>

<div *ngIf="selectedRows.length > 0"
  style="background:#1976d2; color:white; padding:8px 12px; margin-bottom:10px; border-radius:4px;">
  {{selectedRows.length}} items selected

  <button (click)="deleteSelected()"
    style="margin-left:15px; background:white; color:#1976d2; border:none; padding:4px 8px;">
    Delete
  </button>
</div>

<div class="grid-card">
    <ag-grid-angular
        class="ag-theme-alpine"
        style="width: 100%; height: 600px;"
        [rowData]="rowData"
        [columnDefs]="columnDefs"
        [pagination]="true"
        [paginationPageSize]="10"
        (gridReady)="onGridReady($event)"
        [rowSelection]="rowSelection"
        [rowMultiSelectWithClick]="true"
        (selectionChanged)="onSelectionChanged()"
        >
    </ag-grid-angular>
</div>
